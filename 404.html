<!DOCTYPE html>
<html lang="zh">
<head>
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>404</title>
  <style>
    body {
      padding: 2rem;
      margin: 0;
      background:black;
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center; /* 垂直居中 */
      height: 100vh;
    }

.card {
  width: 100%;
  max-width: 400px;
  padding: 2rem;
  background-color: rgba(255, 255, 255, 0.25);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px); 
  border: 0.888889px solid rgba(255, 255, 255, 0.18);
  box-shadow: rgba(142, 142, 142, 0.19) 0px 6px 15px 0px;
  -webkit-box-shadow: rgba(142, 142, 142, 0.19) 0px 6px 15px 0px; 
  border-radius: 12px;
  -webkit-border-radius: 12px; 
  color: rgba(255, 255, 255, 0.75);
}


    .card-title {
      margin-top: 0;
      margin-bottom: 0.5rem;
      font-size: 4rem; /* 增大标题字体 */
      font-weight: bold;
    }

    h3 {
      margin: 0;
      font-weight: normal;
      margin-bottom: 1rem;
    }

    p, a {
      font-size: 1rem;
    }

    a {
      color: #4d4ae8;
      text-decoration: none;
      transition: color 0.3s, text-decoration 0.3s;
    }

    a:hover {
      text-decoration: underline;
      color: #3a3ae8;
    }

    .countdown {
      font-size: 1.2rem;
      margin-top: 1rem;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 600px) {
      .card {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1 class="card-title" role="heading" aria-level="1">404</h1>
    <h3 role="heading" aria-level="2">Not Found</h3>
    <p>哎呀，博客开发时太饿了，把页面吃掉了</p>
    <a href="https://Tank37135.github.io" target="_self">返回首页</a>
    <div class="countdown" id="countdown"></div>
  </div>

  <script>
    window.onload = function() {
      let countdownElement = document.getElementById('countdown');
      let countdown = 5; // 从5秒开始倒计时
      
      countdownElement.textContent = `${countdown}秒后自动返回上一页面`;

      const timer = setInterval(() => {
        countdown--;
        if (countdown <= 0) {
          clearInterval(timer);
          window.history.back(); // 返回上一页面
        }
        countdownElement.textContent = `${countdown}秒后自动返回上一页面`;
      }, 1000);
    };
  </script>
</body>
</html>
