<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仇恨2</title>
    <style>
        .image {
            width: 200px; /* 可以根据需要调整大小 */
            height: 200px; /* 使其为1:1比例 */
            object-fit: cover; /* 保持图片比例并裁剪超出部分 */
        }
        .loader {
    position: fixed; /* 使用 fixed，使加载动画固定在视口 */
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex; /* 使用 flex 布局 */
    background-color: black; /* 不透明黑色背景 */
    color: white; /* 加载文字颜色 */
    justify-content: center;
    align-items: center;
    flex-direction: column; /* 纵向排列 */
    z-index: 1000; /* 确保在最上层 */
    visibility: hidden; /* 初始状态不可见 */
    opacity: 0; /* 初始透明度为 0 */
    transition: visibility 0s 0.5s, opacity 0.5s; /* 动画过渡效果 */
}

.loader.show {
    visibility: visible; /* 可见 */
    opacity: 1; /* 完全不透明 */
}
    </style>
</head>
<body>
<div class="loader" id="loader" aria-label="加载中，请稍候">
        <div class="sk-cube-grid">
            <div class="sk-cube sk-cube-1"></div>
            <div class="sk-cube sk-cube-2"></div>
            <div class="sk-cube sk-cube-3"></div>
            <div class="sk-cube sk-cube-4"></div>
            <div class="sk-cube sk-cube-5"></div>
            <div class="sk-cube sk-cube-6"></div>
            <div class="sk-cube sk-cube-7"></div>
            <div class="sk-cube sk-cube-8"></div>
            <div class="sk-cube sk-cube-9"></div>
        </div>
        <div>加载中，请稍候...</div>
    </div>
    <h1>案件详情</h1>
    <p>我的«c++ primer plus»的45页的中偏右下部分被划了一笔</p>
    <ul>
        <li>
            作案人：Jiieoo.(头像没时间做，下个月一定)
        </li>
        <li>
            被害物品：«c++ primer plus»
            <br>
            <img src="images/book1.jpg" alt="被害物品" class="image">
        </li>
        <li>
            作案工具
            <br>
            <img src="images/pen1.jpg" alt="作案工具" class="image">
        </li>
        <li>
            Tank37135对此的评价:划我最爱的书籍，有话难说
        </li>
        <li>
            作案人说话
        </li>
    </ul>
     body {
      background: linear-gradient(90deg, #edc0bf 0%, #c4caef 58%);
    }
<script>
// 页面加载时显示加载动画
document.body.classList.add('loading'); // 添加加载类
const loader = document.getElementById('loader');
loader.classList.add('show'); // 添加类以显示动画

// 当页面加载完成时隐藏加载动画
window.addEventListener('load', function() {
    loader.classList.remove('show'); // 移除显示类
    setTimeout(() => {
        loader.style.display = 'none'; // 隐藏加载动画
    }, 500); // 等待过渡效果完成后再设置为 none
    document.body.classList.remove('loading'); // 移除加载类
    document.body.style.overflow = 'auto'; // 允许滚动
});
</body>
</html>
