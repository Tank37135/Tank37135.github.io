    <script>
    (function() {
      var o = document.getElementById("loadingOverlay");
      if (!o) return;
      document.body.style.overflow = "hidden";
      var total = document.querySelectorAll("link[rel=stylesheet], script[src]").length, loaded = 0, hidden = false;
      function hide() { if (hidden) return; hidden = true; o.classList.add("loading-overlay--hidden"); setTimeout(function() { o.style.display = "none"; document.body.style.overflow = ""; }, 600); }
      function c() { loaded++; if (loaded >= total) hide(); }
      window.addEventListener("load", hide); setTimeout(hide, 180000);
      if (total === 0) { hide(); return; }
      document.querySelectorAll("link[rel=stylesheet], script[src]").forEach(function(r) {
        if (r.tagName === "LINK") { r.onload = c; r.onerror = c; }
        else { if (r.src) { r.onload = c; r.onerror = c; } else { c(); } }
      });
    })();
  </script>

<script>
(function() {
  var container = document.getElementById("articleResults");
  if (!container) return;
  
  function renderCards(data) {
    container.innerHTML = "";
    data.forEach(function(item) {
      var card = document.createElement("div");
      card.className = "article-card";
      card.setAttribute("data-tags", (item.tags || []).join(","));
      
      var dateEl = document.createElement("div");
      dateEl.className = "article-date";
      dateEl.innerHTML = '<i class="bi bi-calendar-check-fill"></i>' + (item.date || "未记录");
      card.appendChild(dateEl);
      
      var titleEl = document.createElement("h3");
      titleEl.className = "article-title";
      titleEl.textContent = item.title;
      card.appendChild(titleEl);
      
      var excerptEl = document.createElement("p");
      excerptEl.className = "article-excerpt";
      excerptEl.textContent = item.excerpt;
      card.appendChild(excerptEl);
      
      var tagsDiv = document.createElement("div");
      tagsDiv.className = "article-tags";
      (item.tags || []).forEach(function(tag) {
        var span = document.createElement("span");
        span.className = "tag";
        span.textContent = tag;
        tagsDiv.appendChild(span);
      });
      card.appendChild(tagsDiv);
      
      var link = document.createElement("a");
      link.className = "read-more";
      link.href = item.link;
      link.textContent = "阅读更多";
      card.appendChild(link);
      
      container.appendChild(card);
    });
  }
  
  var xhr = new XMLHttpRequest();
  xhr.open("GET", "../../assets/json/articles.json", true);
  xhr.onload = function() {
    if (xhr.status >= 200 && xhr.status < 400) {
      try {
        var data = JSON.parse(xhr.responseText);
        renderCards(data);
      } catch(e) {
        console.error("JSON parse error:", e);
      }
    }
  };
  xhr.onerror = function() {
    console.error("Failed to load articles.json");
  };
  xhr.send();
})();
</script></body>
