                            <label><input type="radio" name="displayType" value="browser" style="accent-color:var(--color-primary);cursor:pointer;"> 浏览器标签</label>

                    <div class="control-group">

                        <select id="resolution" style="width:100%;padding:10px 14px;background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:var(--radius-md);color:#fff;font-size:0.85rem;">
                            <option value="360">360p (640×360)</option>
                            <option value="480">480p (854×480)</option>
                            <option value="720">720p (1280×720)</option>
                            <option value="1080" selected>1080p (1920×1080)</option>
                            <option value="1440">1440p (2560×1440)</option>
                            <option value="2160">2160p (3840×2160)</option>
                        </select>
                    </div>

                    <div class="control-group">
                        <label for="fps" style="display:block;margin-bottom:var(--space-sm);color:var(--color-white-glass);font-size:0.85rem;font-weight:500;">帧率</label>
                        <select id="fps" style="width:100%;padding:10px 14px;background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:var(--radius-md);color:#fff;font-size:0.85rem;">
                            <option value="10">10 fps</option>
                            <option value="15">15 fps</option>
                            <option value="24">24 fps</option>
                            <option value="30" selected>30 fps</option>
                            <option value="60">60 fps</option>

                        <select id="bitrate" style="width:100%;padding:10px 14px;background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:var(--radius-md);color:#fff;font-size:0.85rem;">
                            <option value="500000">500 kbps</option>
                            <option value="1000000">1 Mbps</option>
                            <option value="2000000">2 Mbps</option>
                            <option value="4000000">4 Mbps</option>
                            <option value="8000000" selected>8 Mbps (1080p推荐)</option>
                            <option value="10000000">10 Mbps</option>
                            <option value="20000000">20 Mbps</option>

                        </select>
                    </div>

                            <option value="video/webm" selected>WebM (VP9)</option>

                            <option value="video/ogg">OGG (Theora)</option>
                        </select>

                    <div class="control-group">
                        <label for="quality" style="display:block;margin-bottom:var(--space-sm);color:var(--color-white-glass);font-size:0.85rem;font-weight:500;">质量预设</label>

                        <input type="checkbox" id="enableHardwareAcceleration" checked style="width:18px;height:18px;accent-color:var(--color-primary);cursor:pointer;">

                        <label for="audioBitrate" style="display:block;margin-bottom:var(--space-sm);color:var(--color-white-glass);font-size:0.85rem;font-weight:500;">音频比特率</label>
                        <select id="audioBitrate" style="width:100%;padding:10px 14px;background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:var(--radius-md);color:#fff;font-size:0.85rem;">
                            <option value="64000">64 kbps</option>
                            <option value="96000">96 kbps</option>
                            <option value="128000" selected>128 kbps</option>
                            <option value="192000">192 kbps</option>
                            <option value="256000">256 kbps</option>
                            <option value="320000">320 kbps</option>
                        </select>
                    </div>

                    <div class="button-group" style="grid-column:1/-1;display:flex;flex-wrap:wrap;gap:var(--space-sm);justify-content:center;margin-top:var(--space-md);">
                        <button id="startSharing" class="btn btn--primary">开始屏幕共享</button>
                        <button id="startRecording" class="btn btn--primary" disabled>开始录制</button>
                        <button id="pauseRecording" class="btn btn--ghost" disabled>暂停录制</button>
                        <button id="stopRecording" class="btn btn--ghost" disabled>停止录制</button>
                    </div>

                    <p id="errorMessage" style="grid-column:1/-1;color:#ef5350;font-size:0.85rem;min-height:1.2em;text-align:center;"></p>

                <div class="status-bar" style="grid-column:1/-1;display:flex;justify-content:space-between;align-items:center;padding:var(--space-md);background:var(--glass-bg);border-radius:var(--radius-md);margin-top:var(--space-md);">
                    <span id="status" style="color:var(--color-white-glass);font-size:0.9rem;">准备就绪</span>
                    <span class="timer" id="timer" style="color:var(--color-primary-light);font-family:monospace;font-size:1.1rem;font-weight:600;">00:00:00</span>
                </div>
            </div>

    <script>
    (function() {
      var o = document.getElementById("loadingOverlay");
      if (!o) return;
      document.body.style.overflow = "hidden";
      var total = document.querySelectorAll("link[rel=stylesheet], script[src]").length, loaded = 0, hidden = false;
      function hide() { if (hidden) return; hidden = true; o.classList.add("loading-overlay--hidden"); setTimeout(function() { o.style.display = "none"; document.body.style.overflow = ""; }, 600); }
      function c() { loaded++; if (loaded >= total) hide(); }
      window.addEventListener("load", hide); setTimeout(hide, 180000);
      if (total === 0) { hide(); return; }
      document.querySelectorAll("link[rel=stylesheet], script[src]").forEach(function(r) {
        if (r.tagName === "LINK") { r.onload = c; r.onerror = c; }
        else { if (r.src) { r.onload = c; r.onerror = c; } else { c(); } }
      });
    })();
  </script>

  <script>
document.addEventListener('DOMContentLoaded', () => {
    // 获取DOM元素
    const startSharingButton = document.getElementById("startSharing");
    const startRecordingButton = document.getElementById("startRecording");
    const pauseRecordingButton = document.getElementById("pauseRecording");
    const stopRecordingButton = document.getElementById("stopRecording");
    const videoElement = document.getElementById("video");
    const resolutionSelect = document.getElementById("resolution");
    const bitrateSelect = document.getElementById("bitrate");
    const formatSelect = document.getElementById("format");
    const fpsSelect = document.getElementById("fps");
    const qualitySelect = document.getElementById("quality");
    const displayTypeRadios = document.querySelectorAll('input[name="displayType"]');
    const recordMicrophoneCheckbox = document.getElementById("recordMicrophone");
    const enableHardwareAccelerationCheckbox = document.getElementById("enableHardwareAcceleration");
    const audioBitrateSelect = document.getElementById("audioBitrate");
    const errorMessage = document.getElementById("errorMessage");
    const statusElement = document.getElementById("status");
    const timerElement = document.getElementById("timer");

    // 状态变量
    let mediaStream = null;
    let mediaRecorder = null;
    let recordedChunks = [];
    let recordingInterval = null;
    let recordingStartTime = null;
    let pausedTime = 0;
    let isPaused = false;
    let autoStopTimer = null;
    let currentRecordingNumber = 1;

    // 检查浏览器支持
    if (!navigator.mediaDevices?.getDisplayMedia) {
        showError("您的浏览器不支持屏幕共享功能。请使用Chrome、Edge或Firefox等现代浏览器。");
        startSharingButton.disabled = true;
    }

    if (!window.MediaRecorder) {
        showError("您的浏览器不支持媒体录制功能。");
        startRecordingButton.disabled = true;
    }

    // 开始屏幕共享
    startSharingButton.addEventListener("click", async () => {
        try {
            clearError();
            updateStatus("正在获取屏幕共享权限...");
            
            const displayType = document.querySelector('input[name="displayType"]:checked').value;
            
            // 设置媒体约束
            const constraints = {
                video: {
                    displaySurface: displayType,
                    logicalSurface: true,
                    width: { ideal: getResolutionWidth() },
                    height: { ideal: getResolutionHeight() },
                    frameRate: { ideal: parseInt(fpsSelect.value, 10) },
                    ...(enableHardwareAccelerationCheckbox.checked && {
                        mediaSource: 'screen',
                        googLeakyBucket: true,
                        googTemporalLayeredScreencast: true
                    })
                },
                audio: recordMicrophoneCheckbox.checked ? {
                    autoGainControl: false,
                    echoCancellation: false,
                    noiseSuppression: false,
                    sampleRate: 48000,
                    sampleSize: 16,
                    channelCount: 2,
                    bitrate: parseInt(audioBitrateSelect.value, 10)
                } : false,
                preferCurrentTab: displayType === 'browser'
            };

            // 获取屏幕共享流
            const stream = await navigator.mediaDevices.getDisplayMedia(constraints);

            // 处理用户停止共享
            stream.getVideoTracks()[0].onended = () => {
                handleStreamEnd();
            };

            mediaStream = stream;
            videoElement.srcObject = stream;
            
            // 更新UI状态
            startSharingButton.disabled = true;
            startRecordingButton.disabled = false;
            updateStatus("屏幕共享已开始，准备录制...");
            
        } catch (err) {
            showError(`无法开始屏幕共享: ${err.message}`);
            updateStatus("屏幕共享失败");
        }
    });

    // 开始录制
    startRecordingButton.addEventListener("click", startRecording);

    function startRecording() {
        try {
            clearError();
            updateStatus("正在准备录制...");
            
            const selectedFormat = formatSelect.value;
            const mimeType = getSupportedMimeType(selectedFormat);
            
            if (!mimeType) {
                throw new Error(`浏览器不支持所选格式: ${selectedFormat}`);
            }

            // 设置录制选项
            const options = {
                mimeType,
                videoBitsPerSecond: parseInt(bitrateSelect.value, 10),
                audioBitsPerSecond: parseInt(audioBitrateSelect.value, 10),
                ...(enableHardwareAccelerationCheckbox.checked && {
                    bitsPerSecond: parseInt(bitrateSelect.value, 10),
                    videoKeyFrameInterval: 60,
                    videoBitrateMode: 'constant'
                })
            };

            // 创建媒体录制器
            mediaRecorder = new MediaRecorder(mediaStream, options);

            // 设置事件处理器
            mediaRecorder.ondataavailable = handleDataAvailable;
            mediaRecorder.onstart = handleRecordingStart;
            mediaRecorder.onstop = handleRecordingStop;
            mediaRecorder.onpause = handleRecordingPause;
            mediaRecorder.onresume = handleRecordingResume;
            mediaRecorder.onerror = handleRecordingError;

            // 开始录制
            recordedChunks = [];
            mediaRecorder.start(1000); // 每1秒收集一次数据
            
            // 更新UI状态
            startRecordingButton.disabled = true;
            pauseRecordingButton.disabled = false;
            stopRecordingButton.disabled = false;
            startRecordingButton.classList.add("recording");
            
            // 禁用其他控件
            enableControls(false);
            
        } catch (err) {
            showError(`录制开始失败: ${err.message}`);
            updateStatus("录制失败");
        }
    }

    // 暂停/恢复录制
    pauseRecordingButton.addEventListener("click", () => {
        if (mediaRecorder && mediaRecorder.state === 'recording') {
            mediaRecorder.pause();
            isPaused = true;
            pauseRecordingButton.textContent = "恢复录制";
            pauseRecordingButton.classList.remove("secondary-btn");
            pauseRecordingButton.classList.add("primary-btn");
        } else if (mediaRecorder && mediaRecorder.state === 'paused') {
            mediaRecorder.resume();
            isPaused = false;
            pauseRecordingButton.textContent = "暂停录制";
            pauseRecordingButton.classList.remove("primary-btn");
            pauseRecordingButton.classList.add("secondary-btn");
        }
    });

    // 停止录制
    stopRecordingButton.addEventListener("click", () => {
        if (mediaRecorder && mediaRecorder.state !== 'inactive') {
            mediaRecorder.stop();
        }
        pauseRecordingButton.disabled = true;
        stopRecordingButton.disabled = true;
        isPaused = false;
        pauseRecordingButton.textContent = "暂停录制";
    });

    // 质量预设变化处理
    qualitySelect.addEventListener("change", () => {
        switch(qualitySelect.value) {
            case "highQuality":
                resolutionSelect.value = "2160";
                bitrateSelect.value = "50000000";
                fpsSelect.value = "60";
                formatSelect.value = "video/mp4;codecs=h265";
                audioBitrateSelect.value = "192000";
                break;
            case "highPerformance":
                resolutionSelect.value = "1080";
                bitrateSelect.value = "8000000";
                fpsSelect.value = "60";
                formatSelect.value = "video/webm;codecs=vp8";
                audioBitrateSelect.value = "96000";
                break;
            case "balanced":
                resolutionSelect.value = "1440";
                bitrateSelect.value = "20000000";
                fpsSelect.value = "120";
                formatSelect.value = "video/webm";
                audioBitrateSelect.value = "128000";
                break;
        }
    });

    // ========== 工具函数 ==========

    // 处理数据可用事件
    function handleDataAvailable(event) {
        if (event.data.size > 0) {
            recordedChunks.push(event.data);
        }
    }

    // 处理录制开始事件
    function handleRecordingStart() {
        recordingStartTime = Date.now();
        recordingInterval = setInterval(updateRecordingTime, 100);
        updateStatus(`录制中 (第${currentRecordingNumber}段)`);
        
        // 设置30分钟自动停止
        autoStopTimer = setTimeout(() => {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
        }, 30 * 60 * 1000);
    }

    // 处理录制停止事件
    function handleRecordingStop() {
        clearInterval(recordingInterval);
        clearTimeout(autoStopTimer);
        saveRecording();
        currentRecordingNumber++;
        
        // 自动开始新录制
        if (mediaStream && mediaStream.active) {
            setTimeout(() => {
                if (mediaStream.active) {
                    startRecording();
                }
            }, 1000);
        } else {
            updateStatus("录制已保存");
            enableControls(true);
        }
    }

    // 处理录制暂停事件
    function handleRecordingPause() {
        pausedTime = Date.now();
        updateStatus("录制已暂停");
    }

    // 处理录制恢复事件
    function handleRecordingResume() {
        if (pausedTime) {
            recordingStartTime += (Date.now() - pausedTime);
            pausedTime = 0;
        }
        updateStatus("录制已恢复");
    }

    // 处理录制错误事件
    function handleRecordingError(event) {
        showError(`录制错误: ${event.error.name}`);
        updateStatus("录制失败");
        cleanup();
    }

    // 保存录制内容
    function saveRecording() {
        if (recordedChunks.length === 0) {
            showError("没有录制内容可保存");
            return;
        }

        const blob = new Blob(recordedChunks, { 
            type: mediaRecorder.mimeType 
        });
        
        const url = URL.createObjectURL(blob);
        const formatExtension = getFormatExtension(mediaRecorder.mimeType);
        const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
        
        const link = document.createElement("a");
        link.href = url;
        link.download = `recording-${timestamp}-part${currentRecordingNumber}.${formatExtension}`;
        link.click();
        
        // 延迟释放内存，确保浏览器开始下载
        setTimeout(function() {
          URL.revokeObjectURL(url);
        }, 5000);
        recordedChunks = [];
    }

    // 处理流结束
    function handleStreamEnd() {
        if (mediaRecorder && mediaRecorder.state === 'recording') {
            mediaRecorder.stop();
        }
        cleanup();
        updateStatus("屏幕共享已停止");
        enableControls(true);
    }

    // 清理资源
    function cleanup() {
        if (mediaStream) {
            mediaStream.getTracks().forEach(track => track.stop());
            mediaStream = null;
        }
        
        if (videoElement.srcObject) {
            videoElement.srcObject = null;
        }
        
        recordedChunks = [];
        clearInterval(recordingInterval);
        clearTimeout(autoStopTimer);
        
        startSharingButton.disabled = false;
        startRecordingButton.disabled = true;
        pauseRecordingButton.disabled = true;
        stopRecordingButton.disabled = true;
        startRecordingButton.classList.remove("recording");
        
        currentRecordingNumber = 1;
        timerElement.textContent = "00:00:00";
    }

    // 更新录制时间
    function updateRecordingTime() {
        if (isPaused) return;
        
        const elapsedMs = Date.now() - recordingStartTime;
        const date = new Date(elapsedMs);
        const hours = date.getUTCHours().toString().padStart(2, '0');
        const minutes = date.getUTCMinutes().toString().padStart(2, '0');
        const seconds = date.getUTCSeconds().toString().padStart(2, '0');
        
        timerElement.textContent = `${hours}:${minutes}:${seconds}`;
    }

    // 启用/禁用控件
    function enableControls(enable) {
        startSharingButton.disabled = !enable;
        displayTypeRadios.forEach(radio => {
            radio.disabled = !enable;
        });
        recordMicrophoneCheckbox.disabled = !enable;
        enableHardwareAccelerationCheckbox.disabled = !enable;
        resolutionSelect.disabled = !enable;
        bitrateSelect.disabled = !enable;
        formatSelect.disabled = !enable;
        fpsSelect.disabled = !enable;
        qualitySelect.disabled = !enable;
        audioBitrateSelect.disabled = !enable;
    }

    // 获取分辨率宽度
    function getResolutionWidth() {
        const resolution = resolutionSelect.value;
        const resolutions = {
            '360': 640,
            '480': 854,
            '720': 1280,
            '1080': 1920,
            '1440': 2560,
            '2160': 3840,
            '4320': 7680,
            '8640': 15360
        };
        return resolutions[resolution] || 3840;
    }

    // 获取分辨率高度
    function getResolutionHeight() {
        const resolution = resolutionSelect.value;
        const resolutions = {
            '360': 360,
            '480': 480,
            '720': 720,
            '1080': 1080,
            '1440': 1440,
            '2160': 2160,
            '4320': 4320,
            '8640': 8640
        };
        return resolutions[resolution] || 2160;
    }

    // 获取支持的MIME类型
    function getSupportedMimeType(desiredFormat) {
        const possibleTypes = [
            `${desiredFormat};codecs=vp9,opus`,
            `${desiredFormat};codecs=vp8,opus`,
            `${desiredFormat};codecs=h265,opus`,
            `${desiredFormat};codecs=h264,opus`,
            `${desiredFormat};codecs=av1,opus`,
            desiredFormat
        ];
        
        for (const mimeType of possibleTypes) {
            if (MediaRecorder.isTypeSupported(mimeType)) {
                return mimeType;
            }
        }
        return null;
    }

    // 获取文件扩展名
    function getFormatExtension(mimeType) {
        const extensions = {
            'video/webm': 'webm',
            'video/mp4': 'mp4',
            'video/x-matroska': 'mkv',
            'video/ogg': 'ogv'
        };
        return extensions[mimeType.split(';')[0]] || 'webm';
    }

    // 显示错误
    function showError(message) {
        errorMessage.textContent = message;
        console.error(message);
    }

    // 清除错误
    function clearError() {
        errorMessage.textContent = '';
    }

    // 更新状态
    function updateStatus(message) {
        statusElement.textContent = message;
    }

    // 页面卸载前警告
    window.addEventListener('beforeunload', (e) => {
        if (mediaRecorder && mediaRecorder.state === 'recording') {
            e.preventDefault();
            return e.returnValue = "您正在录制屏幕，确定要离开吗？";
        }
    });
});
</script>
